{% extends "base.html" %}

{% block title %}{{ 'Edit Transaction' if transaction else 'Add New Transaction' }}{% endblock %}

{% block content %}
<div class="flex flex-col gap-6">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-h1">{{ 'Edit Transaction' if transaction else 'Add New Transaction' }}</h1>
    <a href="{{ url_for('investment.index') }}" class="btn btn-ghost btn-sm">
      <i data-lucide="arrow-left" class="w-4 h-4"></i>
      Go Back
    </a>
  </div>

  <div class="card card-body">
    <form action="{{ url_for('investment.edit_investment', id=transaction.id) if transaction else url_for('investment.add_investment') }}" method="POST" class="space-y-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-2">
          <label for="investment_type_id" class="form-label">Investment Type</label>
          <select name="investment_type_id" id="investment_type_id" required class="form-select w-full">
            {% if types %}
              {% for type in types %}
                {% if not type.parent_id %}
                  <optgroup label="{{ type.name }}">
                    {% for child in type.children %}
                      <option value="{{ child.id }}" {% if transaction and transaction.investment_type_id == child.id %}selected{% endif %}>
                        {{ child.name }}
                      </option>
                    {% endfor %}
                  </optgroup>
                {% endif %}
              {% endfor %}
            {% endif %}
          </select>
        </div>

        <div class="space-y-2">
          <label for="transaction_date" class="form-label">Transaction Date</label>
          <input type="date" name="transaction_date" id="transaction_date" required
                 value="{{ transaction.transaction_date.strftime('%Y-%m-%d') if transaction else today }}"
                 class="form-control w-full">
        </div>

        <div class="space-y-2">
          <label for="transaction_type" class="form-label">Transaction Type</label>
          <select name="transaction_type" id="transaction_type" required class="form-select w-full">
            <option value="buy" {% if transaction and transaction.transaction_type == 'buy' %}selected{% endif %}>Buy</option>
            <option value="sell" {% if transaction and transaction.transaction_type == 'sell' %}selected{% endif %}>Sell</option>
          </select>
        </div>

        <div class="space-y-2">
          <label for="amount" class="form-label">Amount</label>
          <input type="number" name="amount" id="amount" step="0.01" required
                 value="{{ transaction.amount if transaction else '' }}"
                 class="form-control w-full">
        </div>

        <div class="space-y-2">
          <label for="price" class="form-label">Price</label>
          <input type="number" name="price" id="price" step="0.01" required
                 value="{{ transaction.price if transaction else '' }}"
                 class="form-control w-full">
        </div>

        <div class="space-y-2">
          <label for="quantity" class="form-label">Quantity</label>
          <input type="number" name="quantity" id="quantity" step="0.01" required
                 value="{{ transaction.quantity if transaction else '' }}"
                 class="form-control w-full">
        </div>

        <div class="space-y-2 md:col-span-2">
          <label for="description" class="form-label">Description</label>
          <input type="text" name="description" id="description"
                 value="{{ transaction.description if transaction else '' }}"
                 class="form-control w-full">
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <a href="{{ url_for('investment.index') }}" class="btn btn-secondary btn-sm">
          <i data-lucide="x" class="w-4 h-4"></i>
          Cancel
        </a>
        <button type="submit" class="btn btn-primary btn-sm">
          <i data-lucide="check" class="w-4 h-4"></i>
          Save
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
