{% extends "base.html" %}

{% block title %}{{ 'Edit Category' if category else 'Add Category' }}{% endblock %}

{% block content %}
<div class="flex flex-col gap-6">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-h1">{{ 'Edit Category' if category else 'Add Category' }}</h1>
    <a href="{{ url_for('category.index') }}" class="btn btn-ghost btn-sm">
      <i data-lucide="arrow-left" class="w-4 h-4"></i>
      Go Back
    </a>
  </div>

  <div class="card card-body">
    <form method="POST" action="{{ url_for('category.edit_category', id=category.id) if category else url_for('category.add_category') }}" class="space-y-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="space-y-2">
        <label for="name" class="form-label">Category Name</label>
        <input type="text" id="name" name="name" value="{{ category.name if category else '' }}" required
               class="form-control w-full">
      </div>

      <div class="space-y-2">
        <label for="parent_id" class="form-label">Parent Category</label>
        <select id="parent_id" name="parent_id" class="form-select w-full">
          <option value="">Main Category</option>
          {% if categories %}
            {% for cat in categories %}
              {% if not category or cat.id != category.id %}
                <option value="{{ cat.id }}" {% if category and category.parent_id == cat.id %}selected{% endif %}>
                  {{ cat.name }}
                </option>
              {% endif %}
            {% endfor %}
          {% endif %}
        </select>
      </div>

      <div class="flex justify-end gap-3 mt-6">
        <a href="{{ url_for('category.index') }}" class="btn btn-secondary btn-sm">
          <i data-lucide="x" class="w-4 h-4"></i>
          Cancel
        </a>
        <button type="submit" class="btn btn-primary btn-sm">
          <i data-lucide="check" class="w-4 h-4"></i>
          Save
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
