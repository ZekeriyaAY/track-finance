<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Where's My Money?</title>

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">

    <!-- Fonts: Geist Sans + Geist Mono -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

    <!-- Icons: Lucide -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Custom styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Geist Sans"', 'system-ui', 'sans-serif'],
              mono: ['"Geist Mono"', 'ui-monospace', 'monospace'],
            },
            colors: {
              base: '#0d1117',
              surface: '#161b22',
              elevated: '#1c2128',
              overlay: '#21262d',
              primary: {
                DEFAULT: '#e5884a',
                hover: '#d67a3c',
                muted: 'rgba(229, 136, 74, 0.12)',
              },
              positive: {
                DEFAULT: '#6dba8a',
                muted: 'rgba(109, 186, 138, 0.12)',
              },
              negative: {
                DEFAULT: '#d4616e',
                muted: 'rgba(212, 97, 110, 0.12)',
              },
              warning: {
                DEFAULT: '#d4a054',
                muted: 'rgba(212, 160, 84, 0.12)',
              },
              info: {
                DEFAULT: '#5b9fd4',
                muted: 'rgba(91, 159, 212, 0.12)',
              },
              border: {
                DEFAULT: 'rgba(255, 255, 255, 0.08)',
                subtle: 'rgba(255, 255, 255, 0.04)',
              },
            },
            textColor: {
              primary: '#e6edf3',
              secondary: '#b0b8c4',
              muted: '#6b7280',
              'on-primary': '#0d1117',
            },
            borderRadius: {
              sm: '6px',
              md: '8px',
              lg: '12px',
              xl: '16px',
              full: '9999px',
            },
            boxShadow: {
              sm: '0 1px 2px rgba(0,0,0,0.3)',
              md: '0 4px 12px rgba(0,0,0,0.25)',
              lg: '0 8px 24px rgba(0,0,0,0.35)',
              glow: '0 0 0 3px rgba(229, 136, 74, 0.3)',
            },
            spacing: {
              '4.5': '18px',
              '13': '52px',
              '15': '60px',
              '16': '64px',
              '60': '240px',
            },
          }
        }
      }
    </script>

    {% endblock %}
</head>
<body class="{% block body_class %}bg-base text-[#e6edf3] font-sans min-h-screen antialiased{% endblock %}">
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
</body>
</html>
