{% extends "base.html" %}

{% block title %}{{ 'Edit Tag' if tag else 'Add Tag' }}{% endblock %}

{% block content %}
<div class="flex flex-col gap-6">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-h1">{{ 'Edit Tag' if tag else 'Add Tag' }}</h1>
    <a href="{{ url_for('tag.index') }}" class="btn btn-ghost btn-sm">
      <i data-lucide="arrow-left" class="w-4 h-4"></i>
      Go Back
    </a>
  </div>

  <div class="card card-body">
    <form method="POST" action="{{ url_for('tag.edit_tag', id=tag.id) if tag else url_for('tag.add_tag') }}" class="space-y-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="space-y-2">
        <label for="name" class="form-label">Tag Name</label>
        <input type="text" id="name" name="name" value="{{ tag.name if tag else '' }}" required
               class="form-control w-full">
      </div>

      <div class="flex justify-end gap-3 mt-6">
        <a href="{{ url_for('tag.index') }}" class="btn btn-secondary btn-sm">
          <i data-lucide="x" class="w-4 h-4"></i>
          Cancel
        </a>
        <button type="submit" class="btn btn-primary btn-sm">
          <i data-lucide="check" class="w-4 h-4"></i>
          Save
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
