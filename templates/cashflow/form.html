{% extends "base.html" %}

{% block title %}{{ 'Edit Transaction' if transaction else 'Add Transaction' }}{% endblock %}

{% block content %}
<div class="flex flex-col gap-6">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-h1">{{ 'Edit Transaction' if transaction else 'Add Transaction' }}</h1>
    <a href="{{ url_for('cashflow.index') }}" class="btn btn-ghost btn-sm">
      <i data-lucide="arrow-left" class="w-4 h-4"></i>
      Go Back
    </a>
  </div>

  <div class="card card-body">
    <form method="POST" action="{{ url_for('cashflow.edit_cashflow', id=transaction.id) if transaction else url_for('cashflow.add_cashflow') }}" class="space-y-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-2">
          <label for="date" class="form-label">Date</label>
          <input type="date" id="date" name="date"
                 value="{{ transaction.date.strftime('%Y-%m-%d') if transaction else today }}" required
                 class="form-control w-full">
        </div>

        <div class="space-y-2">
          <label for="amount" class="form-label">Amount</label>
          <input type="number" id="amount" name="amount" step="0.01"
                 value="{{ transaction.amount if transaction else '' }}" required
                 class="form-control w-full">
        </div>

        <div class="space-y-2">
          <label for="type" class="form-label">Transaction Type</label>
          <select id="type" name="type" required class="form-select w-full">
            <option value="expense" {% if transaction and transaction.type == 'expense' or not transaction %}selected{% endif %}>Expense</option>
            <option value="income" {% if transaction and transaction.type == 'income' %}selected{% endif %}>Income</option>
          </select>
        </div>

        <div class="space-y-2">
          <label for="category" class="form-label">Category</label>
          <select id="category" name="category_id" required class="form-select w-full">
            {% for category in categories %}
              {% if not category.parent %}
                <optgroup label="{{ category.name }}">
                  {% for subcategory in category.subcategories %}
                    <option value="{{ subcategory.id }}" {% if transaction and transaction.category_id == subcategory.id %}selected{% endif %}>{{ subcategory.name }}</option>
                  {% endfor %}
                </optgroup>
              {% endif %}
            {% endfor %}
          </select>
        </div>

        <div class="space-y-2 md:col-span-2">
          <label for="description" class="form-label">Description</label>
          <input type="text" id="description" name="description"
                 value="{{ transaction.description if transaction else '' }}"
                 class="form-control w-full">
        </div>

        <div class="space-y-2 md:col-span-2">
          <label class="form-label">Tags</label>
          <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
            {% for tag in tags %}
            <label class="inline-flex items-center gap-2 p-2 rounded-md bg-[var(--bg-elevated)] border border-[var(--border-default)] hover:bg-[var(--bg-overlay)] cursor-pointer transition">
              <input type="checkbox" name="tags" value="{{ tag.id }}"
                     {% if transaction and tag in transaction.tags %}checked{% endif %}
                     class="rounded border-[var(--border-default)] text-primary focus:ring-[var(--primary-border)]">
              <span class="text-sm text-[var(--text-secondary)]">{{ tag.name }}</span>
            </label>
            {% endfor %}
          </div>
        </div>
      </div>

      <div class="flex justify-end gap-3 mt-6">
        <a href="{{ url_for('cashflow.index') }}" class="btn btn-secondary btn-sm">
          <i data-lucide="x" class="w-4 h-4"></i>
          Cancel
        </a>
        <button type="submit" class="btn btn-primary btn-sm">
          <i data-lucide="check" class="w-4 h-4"></i>
          Save
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
