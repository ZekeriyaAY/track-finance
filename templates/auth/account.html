{% extends "base.html" %}

{% block title %}Account Settings{% endblock %}

{% block content %}
<div class="flex flex-col gap-6">
  <div class="mb-4">
    <h1 class="text-h1">Account Settings</h1>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Change Username -->
    <div class="card card-body">
      <h2 class="text-h2 mb-4 flex items-center gap-2">
        <i data-lucide="user-pen" class="w-5 h-5"></i>
        Change Username
      </h2>
      <form method="POST" action="{{ url_for('auth.change_username') }}" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="space-y-2">
          <label class="form-label">Current Username</label>
          <p class="form-control w-full opacity-60">{{ current_user.username }}</p>
        </div>

        <div class="space-y-2">
          <label for="new_username" class="form-label">New Username</label>
          <input type="text" id="new_username" name="new_username" required minlength="3"
                 class="form-control w-full">
          <p class="form-text">Minimum 3 characters</p>
        </div>

        <div class="space-y-2">
          <label for="username_password" class="form-label">Password</label>
          <input type="password" id="username_password" name="password" required
                 class="form-control w-full">
          <p class="form-text">Enter your password to confirm</p>
        </div>

        <div class="flex justify-end pt-2">
          <button type="submit" class="btn btn-primary btn-sm">
            <i data-lucide="check" class="w-4 h-4"></i>
            Update Username
          </button>
        </div>
      </form>
    </div>

    <!-- Change Password -->
    <div class="card card-body">
      <h2 class="text-h2 mb-4 flex items-center gap-2">
        <i data-lucide="key-round" class="w-5 h-5"></i>
        Change Password
      </h2>
      <form method="POST" action="{{ url_for('auth.change_password') }}" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="space-y-2">
          <label for="current_password" class="form-label">Current Password</label>
          <input type="password" id="current_password" name="current_password" required
                 class="form-control w-full">
        </div>

        <div class="space-y-2">
          <label for="new_password" class="form-label">New Password</label>
          <input type="password" id="new_password" name="new_password" required minlength="6"
                 class="form-control w-full">
          <p class="form-text">Minimum 6 characters</p>
        </div>

        <div class="space-y-2">
          <label for="confirm_password" class="form-label">Confirm New Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                 class="form-control w-full">
        </div>

        <div class="flex justify-end pt-2">
          <button type="submit" class="btn btn-primary btn-sm">
            <i data-lucide="check" class="w-4 h-4"></i>
            Update Password
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
